<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Stockify Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-tr from-slate-900 via-indigo-950 to-slate-900 h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute w-[400px] h-[400px] bg-indigo-600/10 rounded-full blur-[120px] -top-20 -left-20 pointer-events-none"></div>
    <div class="absolute w-[300px] h-[300px] bg-emerald-600/10 rounded-full blur-[100px] -bottom-10 -right-10 pointer-events-none"></div>

    <div class="bg-white/95 backdrop-blur-md p-8 sm:p-10 rounded-3xl shadow-2xl border border-white/20 w-full max-w-md transform transition-all duration-300 hover:scale-[1.01]">
        
        <div class="text-center mb-8">
            <div class="inline-flex bg-indigo-600 text-white p-3 rounded-2xl shadow-lg shadow-indigo-500/30 mb-4">
                <i class="fa-solid fa-boxes-stacked text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-blue-600">
                Stockify 
                <span class="text-indigo-600 font-medium text-sm bg-indigo-50 px-2 py-0.5 rounded-md ml-1">v2.0</span>
            </h1>
        </div>
        
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            
            <div>
                <label class="block text-slate-700 text-xs font-semibold mb-2 uppercase tracking-wider">Username</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400 text-sm">
                        <i class="fa-regular fa-user"></i>
                    </span>
                    <input type="text" id="username" required 
                        class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm transition font-medium text-slate-800 placeholder:text-slate-400" 
                        placeholder="Masukkan admin / staff">
                </div>
            </div>
            
            <div>
                <label class="block text-slate-700 text-xs font-semibold mb-2 uppercase tracking-wider">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400 text-sm">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" required 
                        class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm transition font-medium text-slate-800 placeholder:text-slate-400" 
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between text-xs font-medium text-slate-500 pt-1">
                <label class="flex items-center gap-2 cursor-pointer select-none">
                    <input type="checkbox" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500/20 accent-indigo-600 h-4 w-4">
                    <span>Ingat sesi saya</span>
                </label>
                <span class="text-indigo-600 hover:underline cursor-pointer">Butuh bantuan?</span>
            </div>
            
            <button type="submit" id="btn-submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl transition duration-200 shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 text-sm flex items-center justify-center gap-2 group mt-2">
                <span>Masuk ke Sistem</span>
                <i class="fa-solid fa-arrow-right text-xs group-hover:translate-x-0.5 transition-transform"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 grid grid-cols-2 gap-3 text-center">
            <div class="bg-indigo-50/50 rounded-xl p-2.5 border border-indigo-100/40">
                <p class="text-[10px] font-bold uppercase tracking-wider text-indigo-600 mb-0.5">Akses Admin</p>
                <p class="text-xs font-mono font-medium text-slate-600">admin / admin123</p>
            </div>
            <div class="bg-emerald-50/50 rounded-xl p-2.5 border border-emerald-100/40">
                <p class="text-[10px] font-bold uppercase tracking-wider text-emerald-600 mb-0.5">Akses Staff</p>
                <p class="text-xs font-mono font-medium text-slate-600">staff / staff123</p>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btnSubmit = document.getElementById('btn-submit');

            // Efek Loading pada tombol saat tombol ditekan
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-1"></i> Memvalidasi...`;

            try {
                // Mengirimkan data payload ke API Server auth.php
                const response = await fetch('http://localhost/inventori/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (response.ok) {
                    // Menyimpan session otorisasi di memori browser lokal
                    sessionStorage.setItem('user_role', result.user.role);
                    sessionStorage.setItem('username', result.user.username);
                    
                    // ✅ SEKARANG SUDAH DIALIKAN KE index.php
                    window.location.href = 'index.php';
                } else {
                    alert(result.message);
                    resetButton();
                }
            } catch (error) {
                alert("Gagal menghubungi server autentikasi. Pastikan Apache Laragon aktif.");
                resetButton();
            }
        }

        function resetButton() {
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = `<span>Masuk ke Sistem</span><i class="fa-solid fa-arrow-right text-xs"></i>`;
        }
    </script>
</body>
</html>
