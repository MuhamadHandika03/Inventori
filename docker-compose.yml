services:
  db:
    image: mariadb:10.11
    container_name: inventori-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: inventori
      MYSQL_USER: inventori_user
      MYSQL_PASSWORD: inventori_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./inventori/database.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./inventori/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./inventori
    container_name: inventori-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: inventori_user
      DB_PASS: inventori_pass
      DB_NAME: inventori
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
